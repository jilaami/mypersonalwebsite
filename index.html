<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHELA - Login</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f0f23 100%);color:#f5f5f5;}
.font-display{font-family:'Playfair Display',serif;}
.glass-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.gold-gradient{background:linear-gradient(135deg,#d4af37,#f4e4ba,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.btn-gold{background:linear-gradient(135deg,#d4af37,#b8962e);color:#1a1a2e;font-weight:600;padding:12px 32px;border-radius:50px;border:none;cursor:pointer;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(212,175,55,0.3);}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(212,175,55,0.5);}
.input-field{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 18px;color:#f5f5f5;width:100%;transition:all 0.3s ease;}
.input-field:focus{outline:none;border-color:#d4af37;box-shadow:0 0 20px rgba(212,175,55,0.2);}
</style>
</head>
<body class="h-full flex items-center justify-center p-4">

<div class="glass-card p-8 md:p-12 w-full max-w-md">
  <div class="text-center mb-8">
    <h1 class="font-display text-4xl md:text-5xl gold-gradient mb-2">JHELA</h1>
    <p class="text-gray-400 text-sm">Welcome back! Please login to continue.</p>
  </div>
  <form id="login-form" class="space-y-6">
    <div>
      <label for="username" class="block text-sm text-gray-400 mb-2">Username</label>
      <input type="text" id="username" class="input-field" placeholder="Enter your username" autocomplete="username">
    </div>
    <div>
      <label for="password" class="block text-sm text-gray-400 mb-2">Password</label>
      <input type="password" id="password" class="input-field" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <div class="flex items-center justify-between">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="remember-me" class="checkbox-custom">
        <span class="text-sm text-gray-400">Remember Me</span>
      </label>
    </div>
    <button type="submit" class="btn-gold w-full">Login</button>
  </form>
  <div id="login-error" class="hidden mt-4 p-4 bg-red-500/20 border border-red-500/50 rounded-xl text-center text-red-300 text-sm">
    Invalid username or password.
  </div>
</div>

<script>
  const loginForm = document.getElementById('login-form');
  const USERNAME = 'jhela';
  const PASSWORD = '101409';

  loginForm.addEventListener('submit', e=>{
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    if(user===USERNAME && pass===PASSWORD){
      alert('Login successful!'); //
      window.location.href = 'home.html'; 
    }else{
      document.getElementById('login-error').classList.remove('hidden');
    }
    
  });
</script>

</body>
</html>
